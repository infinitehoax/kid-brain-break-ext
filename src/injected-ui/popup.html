<!-- KidBrainBreak Popup HTML — injected into Shadow DOM -->
<div id="kbb-root">

  <!-- ── Backdrop ─────────────────────────────────── -->
  <div id="kbb-backdrop"></div>

  <!-- ── Floating particles ───────────────────────── -->
  <div id="kbb-particles"></div>

  <!-- ── Main Modal ───────────────────────────────── -->
  <div id="kbb-modal" role="dialog" aria-modal="true" aria-label="Brain Break Time!">

    <!-- Header -->
    <div id="kbb-header">
      <div id="kbb-logo">
        <span class="kbb-logo-icon">🧠</span>
        <span class="kbb-logo-text">BrainBreak<span class="kbb-logo-accent">!</span></span>
      </div>
      <div id="kbb-meta">
        <span id="kbb-streak-badge" class="kbb-badge" title="Daily streak">🔥 <span id="kbb-streak-count">0</span></span>
        <span id="kbb-session-badge" class="kbb-badge">#<span id="kbb-session-num">1</span> today</span>
      </div>
    </div>

    <!-- ── SCREEN 1: Spin Wheel (first break of the day) ── -->
    <div id="kbb-screen-wheel" class="kbb-screen" style="display:none">
      <h2 class="kbb-screen-title">Who picks today's category?</h2>
      <p class="kbb-screen-sub">Give it a spin and find out! 🎡</p>
      <div id="kbb-wheel-wrap">
        <canvas id="kbb-wheel-canvas" width="340" height="340"></canvas>
        <div id="kbb-wheel-arrow">▼</div>
      </div>
      <button id="kbb-spin-btn" class="kbb-btn kbb-btn-primary kbb-btn-xl">
        <span>🌀 SPIN!</span>
      </button>
      <p id="kbb-spin-result" class="kbb-spin-result" style="display:none"></p>
    </div>

    <!-- ── SCREEN 2: Category Picker (kid picks) ────── -->
    <div id="kbb-screen-pick" class="kbb-screen" style="display:none">
      <h2 class="kbb-screen-title">You pick! Choose your challenge:</h2>
      <div id="kbb-category-cards">
        <button class="kbb-cat-card" data-cat="ipa">
          <span class="kbb-cat-icon">🔤</span>
          <span class="kbb-cat-name">IPA Transcriber</span>
          <span class="kbb-cat-desc">Turn words into phonetic symbols!</span>
        </button>
        <button class="kbb-cat-card" data-cat="youtube">
          <span class="kbb-cat-icon">▶️</span>
          <span class="kbb-cat-name">YouTube Learner</span>
          <span class="kbb-cat-desc">Watch a video & answer questions!</span>
        </button>
        <button class="kbb-cat-card" data-cat="academic">
          <span class="kbb-cat-icon">📚</span>
          <span class="kbb-cat-name">Academic Quiz</span>
          <span class="kbb-cat-desc">Science, math, history & more!</span>
        </button>
      </div>
    </div>

    <!-- ── SCREEN 3: Question ─────────────────────── -->
    <div id="kbb-screen-question" class="kbb-screen" style="display:none">

      <!-- Category pill + question counter -->
      <div id="kbb-q-topbar">
        <span id="kbb-cat-pill" class="kbb-cat-pill"></span>
        <div id="kbb-timer-ring">
          <svg viewBox="0 0 36 36">
            <circle class="kbb-timer-bg" cx="18" cy="18" r="15"/>
            <circle id="kbb-timer-arc" class="kbb-timer-fg" cx="18" cy="18" r="15"/>
          </svg>
          <span id="kbb-timer-text">2:00</span>
        </div>
      </div>

      <!-- YouTube embed (conditionally shown) -->
      <div id="kbb-yt-container" style="display:none">
        <iframe id="kbb-yt-frame"
          src=""
          frameborder="0"
          allow="autoplay; encrypted-media"
          allowfullscreen
          title="Learning video">
        </iframe>
      </div>

      <!-- Question prompt -->
      <div id="kbb-prompt-area">
        <p id="kbb-prompt-text"></p>
        <p id="kbb-hint-text" class="kbb-hint" style="display:none"></p>
      </div>

      <!-- Dynamic question area (filled by JS components) -->
      <div id="kbb-question-area"></div>

      <!-- Answer controls -->
      <div id="kbb-answer-controls">
        <button id="kbb-hint-btn" class="kbb-btn kbb-btn-ghost">💡 Hint</button>
        <button id="kbb-submit-btn" class="kbb-btn kbb-btn-primary" disabled>Check Answer ✓</button>
      </div>
    </div>

    <!-- ── SCREEN 4: Result ───────────────────────── -->
    <div id="kbb-screen-result" class="kbb-screen" style="display:none">
      <div id="kbb-result-anim"></div>
      <h2 id="kbb-result-title"></h2>
      <p id="kbb-result-explanation" class="kbb-explanation"></p>
      <div id="kbb-xp-bar-wrap">
        <div id="kbb-xp-label">+<span id="kbb-xp-amount">10</span> XP</div>
        <div id="kbb-xp-track"><div id="kbb-xp-fill"></div></div>
      </div>
      <div id="kbb-result-actions">
        <button id="kbb-next-btn" class="kbb-btn kbb-btn-primary">Next Question 🚀</button>
        <button id="kbb-done-btn" class="kbb-btn kbb-btn-ghost">I'm Done ✨</button>
      </div>
    </div>

  </div><!-- /kbb-modal -->

  <!-- Confetti canvas (over everything) -->
  <canvas id="kbb-confetti-canvas"></canvas>

</div><!-- /kbb-root -->
